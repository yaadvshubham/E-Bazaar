<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Checkout — E-Bazaar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F9FC;
      --surface: #FFFFFF;
      --text: #1A1F36;
      --text-muted: #697386;
      --border: #E3E8EE;
      --accent: #5469D4;
      --accent-hover: #4F5EBE;
      --danger: #E03E3E;
      --radius: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background-color: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--text); padding: 20px; }
    .payment-card { background: var(--surface); width: 100%; max-width: 440px; border-radius: 12px; box-shadow: 0 15px 35px rgba(0,0,0,0.05), 0 5px 15px rgba(0,0,0,0.03); overflow: hidden; }
    .header { background: #1A1F36; padding: 32px 24px; text-align: center; color: white; position: relative; }
    .header h1 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
    .amount { font-size: 32px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 4px; }
    .body { padding: 32px 24px; }
    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .tab { padding: 12px 16px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; flex: 1; text-align: center; transition: all 0.2s; border-bottom: 2px solid transparent; }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
    input { width: 100%; padding: 12px 14px; font-size: 15px; border: 1px solid var(--border); border-radius: var(--radius); outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(84, 105, 212, 0.15); }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-pay { width: 100%; background: var(--accent); color: white; font-size: 16px; font-weight: 600; border: none; border-radius: var(--radius); padding: 16px; margin-top: 16px; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-pay:hover { background: var(--accent-hover); }
    .btn-pay:disabled { opacity: 0.7; cursor: not-allowed; }
    .footer { text-align: center; padding: 24px; font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); background: #F8FAFC; }
    .footer svg { vertical-align: middle; margin-right: 4px; }
    
    /* Loading spinner */
    .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Success state */
    .success-view { display: none; text-align: center; padding: 48px 24px; }
    .success-icon { width: 64px; height: 64px; background: #E3FCEF; color: #00875A; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-size: 32px; }
    .success-view h2 { font-size: 24px; color: var(--text); margin-bottom: 12px; }
    .success-view p { color: var(--text-muted); font-size: 15px; margin-bottom: 24px; line-height: 1.5; }
    .btn-return { display: inline-block; padding: 12px 24px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); text-decoration: none; font-weight: 600; font-size: 14px; transition: background 0.2s; }
    .btn-return:hover { background: #edf2f7; }
  </style>
</head>
<body>

  <div class="payment-card" id="card-main">
    <div class="header">
      <h1>E-Bazaar Checkout</h1>
      <div class="amount" id="display-amount">₹0</div>
      <p style="font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 4px;">testmode</p>
    </div>
    
    <div class="body" id="form-body">
      <div class="tabs">
        <div class="tab active">Card</div>
        <div class="tab">UPI</div>
        <div class="tab">Netbanking</div>
      </div>
      
      <form id="payment-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="you@example.com" required value="customer@example.com">
        </div>
        <div class="form-group">
          <label>Card Information</label>
          <input type="text" placeholder="1234 5678 9101 1121" maxlength="19" required>
        </div>
        <div class="row">
          <div class="form-group">
            <input type="text" placeholder="MM / YY" maxlength="5" required>
          </div>
          <div class="form-group">
            <input type="text" placeholder="CVC" maxlength="4" required>
          </div>
        </div>
        <div class="form-group">
          <label>Name on Card</label>
          <input type="text" placeholder="Aryan Verma" required>
        </div>
        
        <button type="submit" class="btn-pay" id="btn-pay">
          <span id="btn-text">Pay</span>
          <div class="spinner" id="spinner"></div>
        </button>
      </form>
    </div>
    
    <div class="success-view" id="success-body">
      <div class="success-icon">✓</div>
      <h2>Payment Successful!</h2>
      <p>Thank you for your purchase. Your order has been placed and a receipt has been sent to your email.</p>
      <a href="#" class="btn-return" onclick="window.close(); return false;">Close & Return to Store</a>
    </div>
    
    <div class="footer" id="card-footer">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      Secured by Stripe (Mock)
    </div>
  </div>

  <script>
    // Calculate total from cart
    let total = 0;
    try {
      const cart = JSON.parse(localStorage.getItem('eb_cart_items') || '[]');
      let subtotal = 0;
      let totalDiscount = 0;
      cart.forEach(item => {
        const pPrice = parseInt(item.price.replace(/[^\d]/g, ''));
        const oPrice = parseInt(item.orig.replace(/[^\d]/g, ''));
        const qty = item.qty || 1;
        subtotal += oPrice * qty;
        totalDiscount += (oPrice - pPrice) * qty;
      });
      total = subtotal - totalDiscount;
    } catch(e) {}
    
    if(total > 0) {
      document.getElementById('display-amount').textContent = '₹' + total.toLocaleString('en-IN');
      document.getElementById('btn-text').textContent = 'Pay ₹' + total.toLocaleString('en-IN');
    }

    document.getElementById('payment-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.getElementById('btn-pay');
      const text = document.getElementById('btn-text');
      const spinner = document.getElementById('spinner');
      
      btn.disabled = true;
      text.style.display = 'none';
      spinner.style.display = 'block';
      
      // Simulate network request
      setTimeout(() => {
        // Clear cart
        localStorage.setItem('eb_cart_items', '[]');
        localStorage.setItem('eb-cart', '0');
        
        // Signal opener window if exists
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage('PAYMENT_SUCCESS', '*');
          } catch(err) {}
        }
        
        // Show success state
        document.getElementById('form-body').style.display = 'none';
        document.getElementById('card-footer').style.display = 'none';
        document.getElementById('success-body').style.display = 'block';
      }, 2000);
    });
  </script>
</body>
</html>
