<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account — E-Bazaar</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body data-page="auth">

<header id="site-header">
  <div class="nav-top">
    <a href="index.html" class="nav-logo">
      <span class="logo-text">E-<em>Bazaar</em></span>
    </a>
  </div>
</header>

<main class="auth-page">
  <div class="auth-container">
    
    <!-- Login / Signup Form -->
    <div id="auth-form-view" class="auth-form">
      <div class="auth-head">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-sub">Enter your details to access your account.</p>
      </div>
      
      <div class="input-group">
        <label>Email or Mobile Number</label>
        <input type="text" placeholder="e.g. +91 9876543210" id="auth-input" />
      </div>
      
      <button class="auth-btn" id="req-otp-btn">Continue with OTP</button>
      
      <div class="auth-divider">OR</div>
      
      <button class="auth-social">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
    </div>

    <!-- OTP View -->
    <div id="otp-view" class="otp-view">
      <div class="auth-head">
        <h1 class="auth-title">Verify OTP</h1>
        <p class="auth-sub">We've sent a code to your number.</p>
      </div>
      
      <div class="otp-inputs">
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
        <input type="text" maxlength="1" />
      </div>
      
      <div class="otp-timer">Resend code in <span id="otp-countdown">00:30</span></div>
      
      <button class="auth-btn" style="margin-top:auto;" id="verify-otp-btn">Verify & Proceed</button>
      <button class="auth-btn" style="background:var(--bg-canvas); color:var(--text-main); margin-top:12px; border:1px solid var(--border);" id="back-to-auth">Back</button>
    </div>
    
  </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
