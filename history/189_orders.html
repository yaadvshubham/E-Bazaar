<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Orders — E-Bazaar</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/orders.css" />
</head>
<body data-page="orders">

<header id="site-header">
  <div class="nav-top">
    <a href="index.html" class="nav-logo">
      <span class="logo-text">E-<em>Bazaar</em></span>
    </a>
  </div>
</header>

<main class="orders-page">
  <h1 class="orders-title">Order History</h1>
  
  <!-- Active Order -->
  <div class="order-card">
    <div class="order-head">
      <div class="o-id">#ORD-88392A <span>• Placed on Oct 24, 2026</span></div>
      <div class="o-status active">In Transit</div>
    </div>
    
    <div class="order-items">
      <div class="o-item">
        <div class="oi-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
        <div class="oi-details">
          <div class="oi-name">Nike Air Max 270</div>
          <div class="oi-sub">Men's Shoes • Size 10 • White/Black</div>
        </div>
        <div class="oi-price">₹12,495</div>
      </div>
    </div>

    <!-- Horizontal Timeline -->
    <div class="o-timeline">
      <div class="tl-step done">
        <div class="tl-icon"></div>
        <div class="tl-text">Order<br>Placed</div>
      </div>
      <div class="tl-step done">
        <div class="tl-icon"></div>
        <div class="tl-text">Packed</div>
      </div>
      <div class="tl-step done">
        <div class="tl-icon"></div>
        <div class="tl-text">Shipped</div>
      </div>
      <div class="tl-step">
        <div class="tl-icon"></div>
        <div class="tl-text">Out for<br>Delivery</div>
      </div>
    </div>

    <div class="o-actions">
      <button class="btn-outline">Track Package</button>
      <button class="btn-outline">View Invoice</button>
    </div>
  </div>

  <!-- Past Order -->
  <div class="order-card">
    <div class="order-head">
      <div class="o-id">#ORD-71934B <span>• Placed on Sep 12, 2026</span></div>
      <div class="o-status delivered">Delivered</div>
    </div>
    
    <div class="order-items">
      <div class="o-item">
        <div class="oi-img"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
        <div class="oi-details">
          <div class="oi-name">Sony WH-1000XM5</div>
          <div class="oi-sub">Wireless Noise Cancelling Headphones • Silver</div>
        </div>
        <div class="oi-price">₹26,990</div>
      </div>
    </div>

    <div class="o-actions">
      <button class="btn-outline">Return / Exchange</button>
      <button class="btn-outline">Write Review</button>
    </div>
  </div>

</main>

<script src="js/script.js"></script>
</body>
</html>
