<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Account — E-Bazaar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <link rel="stylesheet" href="css/auth.css"/>
  <style>
    .logo-bag-body{fill:url(#bagGrad)}
  </style>
</head>
<body class="auth-bg">

<!-- BACKGROUND DECOR -->
<div class="auth-decor auth-d1"></div>
<div class="auth-decor auth-d2"></div>

<div class="auth-container">
  
  <div class="auth-logo">
    <a href="index.html" style="display:flex;align-items:center;gap:12px">
      <svg width="40" height="40" viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#A88C6D"/><stop offset="100%" stop-color="#856B4D"/>
          </linearGradient>
        </defs>
        <rect class="logo-bag-body" x="12" y="28" width="56" height="44" rx="7"/>
        <path d="M28 28 C28 16 52 16 52 28" fill="none" stroke="url(#bagGrad)" stroke-width="4.5" stroke-linecap="round"/>
        <polyline fill="none" stroke="rgba(255,255,255,.92)" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" points="14,50 26,50 30,40 35,60 40,44 45,54 50,50 66,50"/>
      </svg>
      <div class="logo-wordmark">E-<em>Bazaar</em></div>
    </a>
  </div>

  <div class="auth-box" id="auth-box">
    
    <!-- LOGIN PANEL -->
    <div class="auth-panel" id="panel-login">
      <h2 class="auth-h2">Welcome Back</h2>
      <p class="auth-sub">Enter your details to access your account.</p>
      
      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html'">
        <div class="form-group">
          <label>Email or Mobile</label>
          <input type="text" placeholder="aryan@example.com" required/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" placeholder="••••••••" required/>
        </div>
        <div class="auth-options">
          <label class="remember-check"><input type="checkbox"/> Remember me</label>
          <a href="#" class="auth-link">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn">Sign In</button>
      </form>
      
      <div class="auth-switch">
        Don't have an account? <button onclick="toggleAuth('signup')">Sign Up</button>
      </div>
    </div>

    <!-- SIGNUP PANEL -->
    <div class="auth-panel hidden" id="panel-signup">
      <h2 class="auth-h2">Create Account</h2>
      <p class="auth-sub">Join E-Bazaar for exclusive luxury benefits.</p>
      
      <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='index.html'">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="Aryan Verma" required/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" placeholder="aryan@example.com" required/>
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <div class="phone-input">
            <span class="phone-prefix">+91</span>
            <input type="tel" placeholder="98765 43210" required/>
          </div>
        </div>
        <button type="button" class="auth-btn otp-btn" id="send-otp-btn" onclick="showOTP()">Send OTP</button>
        
        <div class="otp-section hidden" id="otp-section">
          <label style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;display:block">Enter 4-Digit OTP</label>
          <div class="otp-inputs">
            <input type="text" maxlength="1"/>
            <input type="text" maxlength="1"/>
            <input type="text" maxlength="1"/>
            <input type="text" maxlength="1"/>
          </div>
          <div class="resend-timer" id="resend-timer">Resend OTP in <span>00:30</span></div>
          <button type="submit" class="auth-btn" style="margin-top:16px">Create Account</button>
        </div>
      </form>
      
      <div class="auth-switch">
        Already have an account? <button onclick="toggleAuth('login')">Sign In</button>
      </div>
    </div>
    
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
